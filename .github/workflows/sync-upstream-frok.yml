name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/huangxd-/danmu_api.git

      - name: Fetch upstream
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Merge upstream but keep local workflows
        shell: bash
        run: |
          set -euo pipefail

          git checkout main
          LOCAL_HEAD=$(git rev-parse HEAD)

          set +e
          git merge --no-ff --no-commit upstream/main
          MERGE_EXIT=$?
          set -e

          NON_WORKFLOW_CONFLICTS=$(git diff --name-only --diff-filter=U | grep -v '^.github/workflows/' || true)
          if [ -n "$NON_WORKFLOW_CONFLICTS" ]; then
            echo "Conflicts outside .github/workflows:"
            echo "$NON_WORKFLOW_CONFLICTS"
            git merge --abort || true
            exit 1
          fi

          # 丢弃 upstream 带来的 workflows 变更，保留你自己仓库当前版本
          rm -rf .github/workflows
          git checkout "$LOCAL_HEAD" -- .github/workflows 2>/dev/null || true

          git add -A

          if git diff --cached --quiet; then
            echo "No code changes to sync."
            git merge --abort || true
            exit 0
          fi

          git commit -m "Sync upstream (exclude .github/workflows)"
          git push origin main
